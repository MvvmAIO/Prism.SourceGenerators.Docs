# Publishes NuStreamDocs static output to GitHub Pages.
# Settings -> Pages: Source = GitHub Actions

name: GitHub Pages

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      base_path:
        description: "Path prefix for GitHub project Pages (default: /<repository>/)."
        required: false
        default: ""

permissions:
  contents: read

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x
          cache: true
          cache-dependency-path: "**/*.csproj"
      - name: Restore
        run: dotnet restore "Prism.SourceGenerators.Docs.csproj"
      - name: Verify Native AOT publish (linux-x64)
        if: github.event_name != 'pull_request'
        run: >-
          dotnet publish "Prism.SourceGenerators.Docs.csproj"
          -c Release -r linux-x64 --self-contained true
      - name: Build static site (NuStreamDocs)
        env:
          DOCS_SITE_URL: https://mvvmaio.github.io/Prism.SourceGenerators.Docs/
          DOCS_BASE_PATH: /${{ github.event.repository.name }}/
        run: >-
          dotnet run --project "Prism.SourceGenerators.Docs.csproj" -c Release --no-restore --no-launch-profile
          --
          "${{ github.workspace }}/gh-pages-publish"
      - name: Write .nojekyll
        if: github.event_name != 'pull_request'
        run: ": > \"${{ github.workspace }}/gh-pages-publish/.nojekyll\""
      - name: Upload Pages artifact
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: gh-pages-publish

  deploy:
    needs: build
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
