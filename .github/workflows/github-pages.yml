# Publishes NuStreamDocs static output to GitHub Pages.
# Settings -> Pages: Source = GitHub Actions

name: GitHub Pages

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      base_path:
        description: "Path prefix for GitHub project Pages (default: /<repository>/)."
        required: false
        default: ""

permissions:
  contents: read

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x
      - name: Verify Native AOT publish (linux-x64)
        run: >-
          dotnet publish "Prism.SourceGenerators.Docs.csproj"
          -c Release -r linux-x64 --self-contained false
      - name: Build static site (NuStreamDocs)
        env:
          DOCS_SITE_URL: https://mvvmaio.github.io/Prism.SourceGenerators.Docs/
        run: >-
          dotnet run --project "Prism.SourceGenerators.Docs.csproj" -c Release
          --
          "${{ github.workspace }}/gh-pages-publish"
      - name: Prefix root-absolute URLs for GitHub project Pages
        if: github.event_name != 'pull_request'
        shell: bash
        run: |
          set -euo pipefail
          ROOT="${{ github.workspace }}/gh-pages-publish"
          if [[ ! -d "${ROOT}" ]]; then
            echo "Missing output directory: ${ROOT}"
            exit 1
          fi
          INPUT_BASE="${{ inputs.base_path }}"
          if [[ -n "${INPUT_BASE}" ]]; then
            BASE="${INPUT_BASE}"
            [[ "${BASE}" == */ ]] || BASE="${BASE}/"
            [[ "${BASE}" == /* ]] || BASE="/${BASE}"
          else
            BASE="/${{ github.event.repository.name }}/"
          fi
          echo "Rewriting href/src/content root paths with prefix: ${BASE}"
          find "${ROOT}" -type f -name '*.html' -print0 | while IFS= read -r -d '' f; do
            sed -i \
              -e "s|href=\"/|href=\"${BASE}|g" \
              -e "s|src=\"/|src=\"${BASE}|g" \
              -e "s|content=\"/|content=\"${BASE}|g" \
              "$f"
          done
          : > "${ROOT}/.nojekyll"
      - name: Upload Pages artifact
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: gh-pages-publish

  deploy:
    needs: build
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
